<!DOCTYPE html><html lang="zh-TW"><head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>混凝土廠全能容器設計 (單位修正版)</title> <style> body { font-family: "Microsoft JhengHei", Arial, sans-serif; background: #f4f7f6; padding: 20px; color: #333; margin: 0; } .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); } h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; } .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; font-size: 0.9em; }

/* 分頁按鈕 */ .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; } .tab-btn { flex: 1; padding: 15px; border: none; background: #f1f1f1; font-size: 1.1em; font-weight: bold; cursor: pointer; color: #888; transition: 0.2s; } .tab-btn:hover { background: #e9e9e9; } .tab-btn.active { background: #fff; color: #2c3e50; border-bottom: 4px solid #3498db; }

/* 內容區塊 */ .tab-content { display: none; } .tab-content.active { display: block; }

.main-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; } @media (max-width: 800px) { .main-grid { grid-template-columns: 1fr; } }

/* 輸入區 */ .input-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef; } .group-head { font-weight: bold; margin-top: 15px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 2px solid #ddd; color: #444; } .input-row { margin-bottom: 10px; } label { display: block; font-size: 0.9em; color: #555; font-weight: bold; margin-bottom: 4px; } input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: monospace; font-size: 15px; } input:focus, select:focus { border-color: #3498db; outline: none; } .dual { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* 結果區 */ .result-panel { text-align: center; } .info-card { background: #fff; border: 2px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; text-align: left; } .res-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.95em; border-bottom: 1px dashed #eee; padding-bottom: 4px; } .res-val { font-weight: bold; font-family: monospace; color: #000; }

.total-box { padding: 15px; border-radius: 8px; color: white; margin-top: 10px; text-align: center; } .bg-cement { background: #2980b9; } .bg-agg { background: #34495e; } .total-val { font-size: 1.5em; font-weight: bold; color: #f1c40f; }

svg { width: 100%; height: 500px; background: white; border: 1px solid #ccc; border-radius: 8px; margin-top: 10px; } .badge { padding: 2px 6px; border-radius: 4px; font-size: 0.8em; color: white; } </style></head><body>

<div class="container"> <h2>🏗️ 混凝土廠全能容器設計 (單位修正版)</h2> <div class="subtitle">水泥桶 (側邊標註) | 骨材庫 (即時連動)</div>

<div class="tabs"> <button id="btn-cement" class="tab-btn active" onclick="switchTab('cement')">🟢 水泥桶 (Silo)</button> <button id="btn-agg" class="tab-btn" onclick="switchTab('agg')">🟤 骨材庫 (Bin)</button> </div>

<div id="tab-cement" class="tab-content active"> <div class="main-grid"> <div class="input-panel"> <div class="group-head" style="margin-top:0;">📋 需求設定</div> <div class="input-row"><label>需求重量 (T)</label><input type="number" id="c_weight" value="150" oninput="runCement()"></div> <div class="input-row"><label>比重 (t/m³)</label><input type="number" id="c_rho" value="1.33" oninput="runCement()"></div> <div class="input-row"><label>預留高 (m)</label><input type="number" id="c_fb" value="0.5" oninput="runCement()"></div>

<div class="group-head">⚙️ 尺寸參數</div> <div class="input-row"><label>直徑 (m)</label><input type="number" id="c_dia" value="4.37" oninput="runCement()"></div> <div class="input-row"><label>單層板高 (m)</label><input type="number" id="c_plate_h" value="1.5" oninput="runCement()"></div> <div class="dual"> <div><label>錐斗斜度 (°)</label><input type="number" id="c_angle" value="60" oninput="runCement()"></div> <div> <div style="display:flex; justify-content:space-between; align-items:end; margin-bottom:4px;"> <label style="margin:0;">出口尺寸</label> <select id="c_out_unit" onchange="runCement()" style="width: auto; padding: 1px; font-size: 12px; height: 20px;"> <option value="inch" selected>英制 (in)</option> <option value="m">公尺 (m)</option> </select> </div> <input type="number" id="c_out_val" value="12" oninput="runCement()"> </div> </div> </div>

<div class="result-panel"> <div class="info-card"> <div class="res-row"><span>所需層數：</span><span class="res-val" id="res_c_layers">--</span></div> <div class="res-row"><span>直身高度：</span><span class="res-val" id="res_c_cyl">--</span></div> <div class="res-row"><span>錐斗高度：</span><span class="res-val" id="res_c_cone">--</span></div> <div class="res-row" style="background:#eef;"><span>總設計高度：</span><span class="res-val" id="res_c_total" style="color:#007bff">--</span></div> </div> <div class="total-box bg-cement"> <div style="font-size:0.9em; opacity:0.8;">預估滿載重量</div> <div class="total-val"><span id="res_c_max">0</span> T</div> </div> <svg id="svgCement" viewBox="0 0 400 500"></svg> </div> </div> </div>

<div id="tab-agg" class="tab-content"> <div class="main-grid"> <div class="input-panel"> <div class="group-head" style="margin-top:0;">1. 共用結構 (田字型)</div> <div class="dual"> <div><label>總長 L (m)</label><input type="number" id="a_L_tot" value="12" oninput="runAgg()"></div> <div><label>總寬 W (m)</label><input type="number" id="a_W_tot" value="12" oninput="runAgg()"></div> </div> <div class="input-row" style="margin-top:10px;"> <label>直身高度 (m)</label><input type="number" id="a_H_box" value="4.8" oninput="runAgg()"> </div>

<div class="group-head" style="color:#d35400; border-color:#d35400;"> <span>2. 砂倉 (左側)</span><span class="badge" style="background:#d35400">左側</span> </div> <div class="dual"> <div><label>錐斗垂高 (m)</label><input type="number" id="a_h_sand" value="4.927" oninput="runAgg()"></div> <div><label>比重</label><input type="number" id="a_rho_sand" value="1.6" oninput="runAgg()"></div> </div> <label style="margin-top:5px;">出口 (m)</label> <div class="dual"> <input type="number" id="a_out_Ls" value="2.3" placeholder="L" oninput="runAgg()"> <input type="number" id="a_out_Ws" value="1.7" placeholder="W" oninput="runAgg()"> </div>

<div class="group-head" style="color:#555; border-color:#555;">3. 石倉 (右側)</div> <div class="dual"> <div><label>錐斗垂高 (m)</label><input type="number" id="a_h_stone" value="4.3" oninput="runAgg()"></div> <div><label>比重</label><input type="number" id="a_rho_stone" value="1.55" oninput="runAgg()"></div> </div> <label style="margin-top:5px;">出口 (m)</label> <div class="dual"> <input type="number" id="a_out_Lst" value="2.3" placeholder="L" oninput="runAgg()"> <input type="number" id="a_out_Wst" value="1.7" placeholder="W" oninput="runAgg()"> </div> </div>

<div class="result-panel"> <div class="info-card"> <div class="res-row"><span>單倉尺寸(Top)：</span><span class="res-val" id="res_a_top">--</span></div> <div class="res-row" style="color:#d35400"><span>砂倉單顆容積：</span><span class="res-val" id="res_a_vol_s">--</span></div> <div class="res-row" style="color:#555"><span>石倉單顆容積：</span><span class="res-val" id="res_a_vol_st">--</span></div> </div> <div class="total-box bg-agg"> <div style="font-size:0.9em; opacity:0.8;">總重量 (2砂+2石)</div> <div class="total-val"><span id="res_a_weight">0</span> T</div> <div style="font-size:0.8em; margin-top:5px;">總容積: <span id="res_a_vol">0</span> m³</div> </div> <svg id="svgAgg" viewBox="0 0 500 500"></svg> </div> </div> </div></div>

<script> // --- 1. 分頁切換 --- function switchTab(tabName) { document.getElementById('tab-cement').className = 'tab-content'; document.getElementById('tab-agg').className = 'tab-content'; document.getElementById('btn-cement').className = 'tab-btn'; document.getElementById('btn-agg').className = 'tab-btn';

if (tabName === 'cement') { document.getElementById('tab-cement').className = 'tab-content active'; document.getElementById('btn-cement').className = 'tab-btn active'; runCement(); } else { document.getElementById('tab-agg').className = 'tab-content active'; document.getElementById('btn-agg').className = 'tab-btn active'; runAgg(); } }

// --- 2. 工具 --- function val(id) { let el = document.getElementById(id); return el ? (parseFloat(el.value) || 0) : 0; }

// --- 3. 水泥桶計算 --- function runCement() { let W = val('c_weight'); let rho = val('c_rho') || 1; let D = val('c_dia'); let plateH = val('c_plate_h'); let ang = val('c_angle'); // 修改處：取得單位並進行換算 let out_val = val('c_out_val'); let out_unit = document.getElementById('c_out_unit').value; let fb = val('c_fb');

// 如果選英制則乘 0.0254，如果選 m 則不變 let d_out = (out_unit === 'inch') ? (out_val * 0.0254) : out_val;

let R = D/2, r = d_out/2;

let h_cone = (R - r) * Math.tan(ang * Math.PI/180); if(h_cone < 0) h_cone = 0; let V_cone = (Math.PI * h_cone / 3) * (R*R + R*r + r*r); let V_req = W / rho; let V_cyl_needed = V_req - V_cone; let Area = Math.PI * R*R; let h_cyl_theo = V_cyl_needed > 0 ? V_cyl_needed / Area : 0; let layers = Math.ceil((h_cyl_theo + fb) / plateH); if(layers === 0 && h_cyl_theo > 0) layers = 1; let h_cyl_act = layers * plateH; let V_total = (Area * h_cyl_act) + V_cone; let W_total = V_total * rho; let H_total = h_cyl_act + h_cone;

document.getElementById('res_c_layers').innerText = layers; document.getElementById('res_c_cyl').innerText = h_cyl_act.toFixed(2) + " m"; document.getElementById('res_c_cone').innerText = h_cone.toFixed(2) + " m"; document.getElementById('res_c_total').innerText = H_total.toFixed(2) + " m"; document.getElementById('res_c_max').innerText = W_total.toFixed(1);

drawCement(D, h_cyl_act, h_cone, d_out, layers); }

function drawCement(D, h1, h2, d_out, layers) { let svg = document.getElementById('svgCement'); svg.innerHTML = ` <defs> <marker id="arrS" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 z" fill="#333"/></marker> <marker id="arrE" markerWidth="8" markerHeight="8" refX="0" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#333"/></marker> </defs>`; let w = 400, h = 500, pad = 60; let totalH = h1 + h2; if(totalH === 0) totalH = 1; // 比例計算 let ppm = (h - pad*2.5) / totalH; if(D * ppm > (w - pad*2)) ppm = (w - pad*2) / D;

let W_px = D * ppm; let H1_px = h1 * ppm; let H2_px = h2 * ppm; let out_px = Math.max(d_out * ppm, 4); let cx = w/2; let x = cx - W_px/2; let y = pad;

// 1. 直身 addRect(svg, x, y, W_px, H1_px, "none", "#333");

// 2. 層線 if(layers > 0 && H1_px > 0) { let step = H1_px / layers; for(let i=1; i<layers; i++) { addLine(svg, x, y + i*step, x + W_px, y + i*step, "#ccc", "4,2"); } }

// 3. 錐斗 let y2 = y + H1_px; let y3 = y2 + H2_px; let outL = cx - out_px/2; let outR = cx + out_px/2; let pts = `${x},${y2} ${x+W_px},${y2} ${outR},${y3} ${outL},${y3}`; addPoly(svg, pts, "none", "#333");

// 4. 尺寸標註 addDimH(svg, x, y-15, W_px, `D=${D}m`); addDimV(svg, x+W_px+15, y, H1_px, `H=${h1.toFixed(2)}m`); addDimV(svg, x+W_px+15, y2, H2_px, `h=${h2.toFixed(2)}m`);

// 5. 出口標註 addLine(svg, outL, y3, outL, y3+25, "#999"); addLine(svg, outR, y3, outR, y3+25, "#999"); let dimY = y3 + 20; addLine(svg, outL, dimY, outR, dimY, "#555"); addText(svg, outR + 5, dimY + 4, `d=${d_out.toFixed(2)}`, "#333", "start"); }

// --- 4. 骨材庫計算 --- function runAgg() { let L = val('a_L_tot'); let W = val('a_W_tot'); let H_box = val('a_H_box'); let h_s = val('a_h_sand'); let rho_s = val('a_rho_sand'); // 修改處：輸入單位已由 mm 改為 m，因此移除 /1000 let out_Ls = val('a_out_Ls'); let out_Ws = val('a_out_Ws');

let h_st = val('a_h_stone'); let rho_st = val('a_rho_stone'); // 修改處：輸入單位已由 mm 改為 m，因此移除 /1000 let out_Lst = val('a_out_Lst'); let out_Wst = val('a_out_Wst');

let L_cell = L/2, W_cell = W/2; let A_top = L_cell * W_cell; let V_box = A_top * H_box;

let A_bot_s = out_Ls * out_Ws; let V_cone_s = (h_s/3)*(A_top + A_bot_s + Math.sqrt(A_top*A_bot_s)); let V_s_one = V_box + V_cone_s;

let A_bot_st = out_Lst * out_Wst; let V_cone_st = (h_st/3)*(A_top + A_bot_st + Math.sqrt(A_top*A_bot_st)); let V_st_one = V_box + V_cone_st;

let V_tot = (V_s_one * 2) + (V_st_one * 2); let W_tot = (V_s_one * rho_s * 2) + (V_st_one * rho_st * 2);

document.getElementById('res_a_top').innerText = `${L_cell.toFixed(2)} x ${W_cell.toFixed(2)} m`; document.getElementById('res_a_vol_s').innerText = V_s_one.toFixed(2) + " m³"; document.getElementById('res_a_vol_st').innerText = V_st_one.toFixed(2) + " m³"; document.getElementById('res_a_weight').innerText = W_tot.toFixed(1); document.getElementById('res_a_vol').innerText = V_tot.toFixed(1);

drawAgg(L, H_box, h_s, h_st, out_Ls, out_Lst); }

function drawAgg(L, H_box, h_s, h_st, w_s, w_st) { let svg = document.getElementById('svgAgg'); svg.innerHTML = ` <defs> <marker id="arrS" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 z" fill="#c0392b"/></marker> <marker id="arrE" markerWidth="8" markerHeight="8" refX="0" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#c0392b"/></marker> <marker id="blkS" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6 z" fill="#333"/></marker> <marker id="blkE" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#333"/></marker> </defs>`;

let w = 500, h = 450, pad = 60; let maxH = H_box + Math.max(h_s, h_st) + 1; if(maxH < 1) maxH = 1; let ppm = (h - pad*2) / maxH; if(L * ppm > (w - pad*2)) ppm = (w - pad*2) / L;

let W_px = (L/2) * ppm; let H_box_px = H_box * ppm; let H_s_px = h_s * ppm; let H_st_px = h_st * ppm; let ws_px = Math.max(w_s*ppm, 5); let wst_px = Math.max(w_st*ppm, 5);

let x = (w - W_px*2)/2; let y = pad;

addRect(svg, x, y, W_px, H_box_px, "#fff3e0", "#333"); addRect(svg, x+W_px, y, W_px, H_box_px, "#f5f5f5", "#333"); addLine(svg, x+W_px, y, x+W_px, y+H_box_px, "#999", "4,4"); addDimV(svg, x+W_px*2 + 10, y, H_box_px, `H=${H_box}m`); addDimH(svg, x, y-30, W_px*2, `L=${L}m`);

let y2 = y + H_box_px; let cx_s = x + W_px/2; let pts_s = `${x},${y2} ${x+W_px},${y2} ${cx_s+ws_px/2},${y2+H_s_px} ${cx_s-ws_px/2},${y2+H_s_px}`; addPoly(svg, pts_s, "none", "#d35400"); let cx_st = x + W_px + W_px/2; let pts_st = `${x+W_px},${y2} ${x+W_px*2},${y2} ${cx_st+wst_px/2},${y2+H_st_px} ${cx_st-wst_px/2},${y2+H_st_px}`; addPoly(svg, pts_st, "none", "#7f8c8d");

addText(svg, cx_s, y+H_box_px/2, "砂", "#d35400"); addText(svg, cx_st, y+H_box_px/2, "石", "#555"); addText(svg, cx_s, y2+H_s_px+20, `h=${h_s}`, "#d35400"); addText(svg, cx_st, y2+H_st_px+20, `h=${h_st}`, "#555"); let diff = Math.abs(h_s - h_st); let mx = x + W_px*2 + 40; let my1 = y2 + H_st_px; let my2 = y2 + H_s_px; addLine(svg, x+W_px*2, my1, mx, my1, "#ccc", "2,2"); addLine(svg, x+W_px, my2, mx, my2, "#ccc", "2,2"); addLine(svg, mx, my1, mx, my2, "#c0392b", null, "diff"); addText(svg, mx+15, (my1+my2)/2, `Δ ${diff.toFixed(2)}`, "#c0392b", "start"); }

// --- Helpers --- function addRect(svg, x, y, w, h, fill, stroke) { let el = document.createElementNS("http://www.w3.org/2000/svg", "rect"); el.setAttribute("x", x); el.setAttribute("y", y); el.setAttribute("width", w); el.setAttribute("height", h); el.setAttribute("fill", fill); el.setAttribute("stroke", stroke); el.setAttribute("stroke-width", 2); svg.appendChild(el); } function addLine(svg, x1, y1, x2, y2, color, dash, markerMode) { let el = document.createElementNS("http://www.w3.org/2000/svg", "line"); el.setAttribute("x1", x1); el.setAttribute("y1", y1); el.setAttribute("x2", x2); el.setAttribute("y2", y2); el.setAttribute("stroke", color); el.setAttribute("stroke-width", 1.5); if(dash) el.setAttribute("stroke-dasharray", dash); if(markerMode === "diff") { el.setAttribute("marker-start", "url(#arrS)"); el.setAttribute("marker-end", "url(#arrE)"); } else if(markerMode === "dim") { el.setAttribute("marker-start", "url(#blkS)"); el.setAttribute("marker-end", "url(#blkE)"); } svg.appendChild(el); } function addPoly(svg, pts, fill, stroke) { let el = document.createElementNS("http://www.w3.org/2000/svg", "polygon"); el.setAttribute("points", pts); el.setAttribute("fill", fill); el.setAttribute("stroke", stroke); el.setAttribute("stroke-width", 2); svg.appendChild(el); } function addText(svg, x, y, txt, color, anchor="middle") { let el = document.createElementNS("http://www.w3.org/2000/svg", "text"); el.setAttribute("x", x); el.setAttribute("y", y); el.setAttribute("fill", color); el.setAttribute("text-anchor", anchor); el.setAttribute("font-family", "monospace"); el.setAttribute("font-weight", "bold"); el.textContent = txt; svg.appendChild(el); } function addDimV(svg, x, y, h, txt) { addLine(svg, x, y, x, y+h, "#555", null, "dim"); addText(svg, x+5, y + h/2, txt, "#333", "start"); addLine(svg, x-5, y, x, y, "#555"); addLine(svg, x-5, y+h, x, y+h, "#555"); } function addDimH(svg, x, y, w, txt) { addLine(svg, x, y, x+w, y, "#555", null, "dim"); addText(svg, x + w/2, y-5, txt, "#333"); addLine(svg, x, y, x, y+5, "#555"); addLine(svg, x+w, y, x+w, y+5, "#555"); }

// 初始化 switchTab('agg');</script>

</body></html>
