<!doctype html><html lang="zh-Hant"><head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>單出口 / 雙出口展開計算器</title> <style> :root { font-family: "Microsoft JhengHei", Arial, sans-serif; } body { margin: 0; background: #f5f5f5; color: #222; } .wrap { max-width: 1080px; margin: 18px auto; padding: 16px; } h1 { margin: 0 0 12px; font-size: 28px; } .card { background: #fff; border: 1px solid #d9d9d9; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); padding: 14px; margin-bottom: 14px; } .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; } select { width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 15px; border: 1px solid #c8c8c8; border-radius: 6px; background: #fff; } label { display: block; font-size: 14px; margin-bottom: 6px; } input { width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 15px; border: 1px solid #c8c8c8; border-radius: 6px; } .btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; } button { border: none; border-radius: 8px; padding: 10px 14px; font-size: 14px; cursor: pointer; background: #6f7f14; color: #fff; } button.secondary { background: #567; } button:disabled { background: #999; cursor: not-allowed; } .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; } .result-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; } .k { font-weight: 700; } .v { text-align: right; font-family: Consolas, monospace; } .note { font-size: 12px; color: #666; } #preview { width: 100%; border: 1px dashed #bbb; background: #fff; border-radius: 8px; } .ok { color: #145a14; } .warn { color: #9b1c1c; } @media (max-width: 860px) { .grid, .two-col, .result-row { grid-template-columns: 1fr; } } </style></head><body> <div class="wrap"> <h1>單出口 / 雙出口展開（板金）</h1>

<div class="card"> <div class="grid"> <div> <label for="mode">展開模式</label> <select id="mode"> <option value="single">單出口（完整展開）</option> <option value="dualHalf">雙出口（單邊展開）</option> </select> </div> <div id="singleInputModeWrap"> <label for="singleInputMode">單出口輸入方式</label> <select id="singleInputMode"> <option value="H">輸入垂高 H</option> <option value="angle">輸入上方夾角 α</option> </select> </div> <div> <label for="D">上方大圓外徑 D (mm)</label> <input id="D" type="number" min="0" step="0.01" value="400" /> </div> <div> <label for="d">下方單一出口外徑 d (mm)</label> <input id="d" type="number" min="0" step="0.01" value="200" /> </div> <div> <label for="t">板厚 t (mm)</label> <input id="t" type="number" min="0" step="0.01" value="3" /> </div> <div> <label for="H">垂直高度 H (mm)</label> <input id="H" type="number" min="0" step="0.01" value="173.205" /> </div> <div id="angleWrap" style="display:none;"> <label for="angle">上方夾角 α (deg)</label> <input id="angle" type="number" min="1" max="89" step="0.01" value="60" /> </div> <div id="pWrap" style="display:none;"> <label for="P">兩出口中心距 P (mm)</label> <input id="P" type="number" min="0" step="0.01" value="200" /> </div> <div id="dualCalWrap1" style="display:none;"> <label for="bigTopLen">大片上邊長校正 (mm)</label> <input id="bigTopLen" type="number" min="0" step="0.01" value="1317" /> </div> <div id="dualCalWrap2" style="display:none;"> <label for="smallTopLen">小片上邊長校正 (mm)</label> <input id="smallTopLen" type="number" min="0" step="0.01" value="797" /> </div> <div id="dualCalWrap3" style="display:none;"> <label for="bigHeightCal">大片總高校正 (mm)</label> <input id="bigHeightCal" type="number" min="0" step="0.01" value="1570" /> </div> <div> <label for="segments">DXF 圓弧分段數</label> <input id="segments" type="number" min="12" max="720" step="1" value="120" /> </div> </div> <div class="btns"> <button id="calcBtn">計算 / 重繪</button> <button id="dxfBtn" class="secondary" disabled>下載 DXF</button> <button id="svgBtn" class="secondary" disabled>下載 SVG</button> <button id="pngBtn" class="secondary" disabled>下載 PNG</button> </div> <div id="msg" class="note"></div> </div>

<div class="two-col"> <div class="card"> <h3>計算結果（中性層）</h3> <div id="results"></div> <p class="note">說明：單出口可在垂高 H / 夾角 α 二選一輸入；雙出口為對稱單邊展開。預設雙出口中心距 P = D/2（可改）。雙出口可輸入「大片上邊 / 小片上邊 / 大片總高」做工程校正以貼近現場圖法。以中性層直徑 Dm=D-t、dm=d-t 展開。</p> </div> <div class="card"> <h3>展開圖預覽</h3> <svg id="preview" viewBox="0 0 800 500"></svg> </div> </div> </div>

<script> const $ = (id) => document.getElementById(id); let model = null;

function num(id) { return parseFloat($(id).value); }

function f(v, p = 3) { return Number(v).toFixed(p); }

function dist3(a, b) { const dx = a[0] - b[0]; const dy = a[1] - b[1]; const dz = (a[2] || 0) - (b[2] || 0); return Math.sqrt(dx * dx + dy * dy + dz * dz); }

function dist2(a, b) { const dx = a[0] - b[0]; const dy = a[1] - b[1]; return Math.sqrt(dx * dx + dy * dy); }

function cross2(o, a, b) { return (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]); }

function circleIntersections(c0, r0, c1, r1) { const dx = c1[0] - c0[0]; const dy = c1[1] - c0[1]; const d = Math.sqrt(dx * dx + dy * dy); if (d === 0 || d > r0 + r1 || d < Math.abs(r0 - r1)) return []; const a = (r0 * r0 - r1 * r1 + d * d) / (2 * d); const h2 = r0 * r0 - a * a; if (h2 < -1e-8) return []; const h = Math.sqrt(Math.max(0, h2)); const xm = c0[0] + (a * dx) / d; const ym = c0[1] + (a * dy) / d; const rx = -dy * (h / d); const ry = dx * (h / d); return [ [xm + rx, ym + ry], [xm - rx, ym - ry] ]; }

function choosePt(cands, prev, preferUp = true) { if (cands.length === 1) return cands[0]; if (cands.length === 0) return null; const score = (p) => { const s1 = preferUp ? p[1] : -p[1]; const s2 = prev ? -dist2(p, prev) : 0; return s1 * 1000 + s2; }; return score(cands[0]) >= score(cands[1]) ? cands[0] : cands[1]; }

function selectByDirection(cands, base, prev) { if (cands.length === 0) return null; if (cands.length === 1 || !prev) return cands[0]; const dirX = base[0] - prev[0]; const dirY = base[1] - prev[1]; const len = Math.sqrt(dirX * dirX + dirY * dirY) || 1; const ux = dirX / len; const uy = dirY / len; const pred = [base[0] + ux, base[1] + uy]; const d0 = dist2(cands[0], pred); const d1 = dist2(cands[1], pred); return d0 <= d1 ? cands[0] : cands[1]; }

function unfoldStrip(a3, b3) { const n = a3.length - 1; const A = new Array(n + 1); const B = new Array(n + 1); A[0] = [0, 0]; B[0] = [dist3(a3[0], b3[0]), 0]; for (let i = 0; i < n; i++) { const aa = dist3(a3[i], a3[i + 1]); const ba = dist3(b3[i], a3[i + 1]); const bb = dist3(b3[i], b3[i + 1]); const ab = dist3(a3[i + 1], b3[i + 1]);

const aNextCands = circleIntersections(A[i], aa, B[i], ba); const aNext = selectByDirection(aNextCands, A[i], i > 0 ? A[i - 1] : null); if (!aNext) throw new Error("展開失敗：A 節點無交點，請提高分段數或檢查尺寸"); A[i + 1] = aNext;

const bNextCands = circleIntersections(B[i], bb, A[i + 1], ab); const bNext = selectByDirection(bNextCands, B[i], i > 0 ? B[i - 1] : null); if (!bNext) throw new Error("展開失敗：B 節點無交點，請提高分段數或檢查尺寸"); B[i + 1] = bNext; } return { A, B }; }

function compute() { const mode = $("mode").value; const singleInputMode = $("singleInputMode").value; const D = num("D"); const d = num("d"); const t = num("t"); const HInput = num("H"); const angleInput = num("angle"); const Pinput = num("P"); const bigTopLen = num("bigTopLen"); const smallTopLen = num("smallTopLen"); const bigHeightCal = num("bigHeightCal"); const segments = Math.max(12, Math.floor(num("segments") || 120));

const msg = $("msg"); msg.className = "note"; msg.textContent = "";

if (![D, d, t].every(Number.isFinite)) { throw new Error("請輸入有效數字"); } if (D <= 0 || d < 0 || t < 0) throw new Error("尺寸必須為正值"); if (D <= d) throw new Error("需滿足 D > d"); if (t >= d) throw new Error("板厚過大，需小於小徑 d");

let P = D / 2; if (mode === "dualHalf") { P = Number.isFinite(Pinput) && Pinput > 0 ? Pinput : D / 2; } const dr = (D - d) / 2; let H = HInput; if (mode === "single" && singleInputMode === "angle") { if (!Number.isFinite(angleInput) || angleInput <= 0 || angleInput >= 90) { throw new Error("上方夾角 α 需介於 0~90 度"); } H = dr * Math.tan(angleInput * Math.PI / 180); } else { if (!Number.isFinite(HInput) || HInput <= 0) { throw new Error("高度 H 必須大於 0"); } } if (mode === "dualHalf" && (!Number.isFinite(H) || H <= 0)) { throw new Error("雙出口模式需輸入有效高度 H"); } const L = Math.sqrt(H * H + dr * dr); const alpha = Math.atan(H / dr); const alphaDeg = alpha * 180 / Math.PI;

const Dm = D - t; const dm = d - t; const dDm = Dm - dm;

const R = L * Dm / dDm; const r = L * dm / dDm; const theta = Math.PI * dDm / L; const thetaDeg = theta * 180 / Math.PI;

let pts; let thetaUsed; let thetaDegUsed; let outerArcLen; let innerArcLen; let Amax; let Bmax; let method = "圓錐台展開"; let ribs = []; let pieces = [];

if (mode === "dualHalf") { const Rt = Dm / 2; const rb = dm / 2; const a3 = []; const b3 = []; for (let i = 0; i <= segments; i++) { const u = i / segments; const ang = Math.PI * u; // 上方半圓：右端 -> 左端 a3.push([Rt * Math.cos(ang), Rt * Math.sin(ang), 0]); b3.push([P / 2 + rb * Math.cos(ang), rb * Math.sin(ang), -H]); } const unfoldedOuter = unfoldStrip(a3, b3); const polyOuter = [...unfoldedOuter.A, ...unfoldedOuter.B.slice().reverse()]; const ribsOuter = unfoldedOuter.A.map((pa, i) => [pa, unfoldedOuter.B[i]]);

const a3inner = []; const b3inner = []; for (let i = 0; i <= segments; i++) { const u = i / segments; a3inner.push([Rt - Dm * u, 0, 0]); // 上方直徑：右端 -> 左端 const ang2 = 2 * Math.PI - Math.PI * u; // 下方另一半圓：右端 -> 左端 b3inner.push([P / 2 + rb * Math.cos(ang2), rb * Math.sin(ang2), -H]); } const unfoldedInner = unfoldStrip(a3inner, b3inner); const polyInner = [...unfoldedInner.A, ...unfoldedInner.B.slice().reverse()]; const ribsInner = unfoldedInner.A.map((pa, i) => [pa, unfoldedInner.B[i]]);

let rawPieces = [ { name: "outer", pts: polyOuter, ribs: ribsOuter }, { name: "inner", pts: polyInner, ribs: ribsInner } ]; if (Number.isFinite(bigTopLen) && Number.isFinite(smallTopLen) && Number.isFinite(bigHeightCal) && bigTopLen > 0 && smallTopLen > 0 && bigHeightCal > 0) { rawPieces = [ calibratePieceByTopAndHeight(rawPieces[0], bigTopLen, bigHeightCal), calibratePieceByTopAndHeight(rawPieces[1], smallTopLen, bigHeightCal) ]; } pieces = layoutPieces(rawPieces); pts = pieces.flatMap((pc) => pc.pts); ribs = pieces.flatMap((pc) => pc.ribs); outerArcLen = 0; innerArcLen = 0; for (let i = 0; i < unfoldedOuter.A.length - 1; i++) outerArcLen += dist2(unfoldedOuter.A[i], unfoldedOuter.A[i + 1]); for (let i = 0; i < unfoldedOuter.B.length - 1; i++) innerArcLen += dist2(unfoldedOuter.B[i], unfoldedOuter.B[i + 1]); const bb = bboxOfPieces(pieces); Amax = bb.maxX - bb.minX; Bmax = bb.maxY - bb.minY; thetaUsed = NaN; thetaDegUsed = NaN; method = "放樣分割近似展開（雙片）"; } else { thetaUsed = theta; thetaDegUsed = theta * 180 / Math.PI; outerArcLen = thetaUsed * R; innerArcLen = thetaUsed * r; const ring = buildRingPoints(R, r, thetaUsed, segments); pts = ring.pts; ribs = ring.outer.map((po, i) => [po, ring.inner[i]]); pieces = [{ name: "single", pts, ribs }]; const bb = bbox(pts); Amax = bb.maxX - bb.minX; Bmax = bb.maxY - bb.minY; }

model = { mode, method, D, d, t, P, alphaDeg, H, L, Dm, dm, R, r, theta: thetaUsed, thetaDeg: thetaDegUsed, outerArcLen, innerArcLen, Amax, Bmax, pts, ribs, pieces, segments }; return model; }

function buildRingPoints(R, r, theta, n) { const pts = []; const outer = []; const inner = []; const start = -theta / 2; const end = theta / 2; for (let i = 0; i <= n; i++) { const a = start + (end - start) * (i / n); const p = [R * Math.cos(a), R * Math.sin(a)]; outer.push(p); pts.push(p); } for (let i = n; i >= 0; i--) { const a = start + (end - start) * (i / n); const p = [r * Math.cos(a), r * Math.sin(a)]; inner[i] = p; pts.push(p); } return { pts, outer, inner }; }

function bbox(pts) { let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity; for (const [x, y] of pts) { if (x < minX) minX = x; if (y < minY) minY = y; if (x > maxX) maxX = x; if (y > maxY) maxY = y; } return { minX, minY, maxX, maxY }; }

function translatePts(pts, dx, dy) { return pts.map((p) => [p[0] + dx, p[1] + dy]); }

function layoutPieces(pieces) { if (!pieces.length) return pieces; const out = []; let cursorX = 0; for (let i = 0; i < pieces.length; i++) { const bb = bbox(pieces[i].pts); const w = bb.maxX - bb.minX; const h = bb.maxY - bb.minY; const gap = Math.max(30, 0.08 * Math.max(w, h)); const dx = cursorX - bb.minX; const dy = -bb.minY; out.push({ name: pieces[i].name, pts: translatePts(pieces[i].pts, dx, dy), ribs: (pieces[i].ribs || []).map((rb) => [[rb[0][0] + dx, rb[0][1] + dy], [rb[1][0] + dx, rb[1][1] + dy]]) }); cursorX += w + gap; } return out; }

function bboxOfPieces(pieces) { let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity; for (const pc of pieces) { const bb = bbox(pc.pts); minX = Math.min(minX, bb.minX); minY = Math.min(minY, bb.minY); maxX = Math.max(maxX, bb.maxX); maxY = Math.max(maxY, bb.maxY); } return { minX, minY, maxX, maxY }; }

function calibratePieceByTopAndHeight(piece, targetTopLen, targetHeight) { const pts = piece.pts; const bb = bbox(pts); const h = Math.max(1e-9, bb.maxY - bb.minY); const band = Math.max(1, h * 0.03); const topPts = pts.filter((p) => p[1] >= bb.maxY - band); if (topPts.length < 2) return piece; let left = topPts[0], right = topPts[0]; for (const p of topPts) { if (p[0] < left[0]) left = p; if (p[0] > right[0]) right = p; } const topLen = Math.max(1e-9, Math.abs(right[0] - left[0])); const sx = targetTopLen > 0 ? targetTopLen / topLen : 1; const sy = targetHeight > 0 ? targetHeight / h : 1; const txPts = pts.map((p) => [p[0] * sx, p[1] * sy]); const txRibs = (piece.ribs || []).map((rb) => [ [rb[0][0] * sx, rb[0][1] * sy], [rb[1][0] * sx, rb[1][1] * sy] ]); return { name: piece.name, pts: txPts, ribs: txRibs }; }

function renderResult(m) { const rows = [ ["模式", m.mode === "dualHalf" ? "雙出口單邊（對稱）" : "單出口完整展開"], ["算法", m.method], ["兩出口中心距 P", m.mode === "dualHalf" ? `${f(m.P)} mm` : "---"], ["錐高 H", `${f(m.H)} mm`], ["換算夾角 α", `${f(m.alphaDeg, 3)} deg`], ["母線長 L (=B)", `${f(m.L)} mm`], ["扇形角 θ", Number.isFinite(m.thetaDeg) ? `${f(m.thetaDeg)} deg` : "---"], ["外半徑 R", `${f(m.R)} mm`], ["內半徑 r", `${f(m.r)} mm`], ["外弧長 A", `${f(m.outerArcLen)} mm`], ["內弧長 a", `${f(m.innerArcLen)} mm`], ["展開最大寬 Amax", `${f(m.Amax)} mm`], ["展開最大高 Bmax", `${f(m.Bmax)} mm`] ];

$("results").innerHTML = rows.map(([k, v]) => ` <div class="result-row"><div class="k">${k}</div><div class="v">${v}</div></div> `).join(""); }

function renderSvg(m) { const svg = $("preview"); const bb = (m.pieces && m.pieces.length) ? bboxOfPieces(m.pieces) : bbox(m.pts); const pad = Math.max(20, 0.08 * Math.max(m.Amax, m.Bmax)); const w = bb.maxX - bb.minX; const h = bb.maxY - bb.minY; svg.setAttribute("viewBox", `${bb.minX - pad} ${bb.minY - pad} ${w + pad * 2} ${h + pad * 2}`);

const pathList = (m.pieces && m.pieces.length ? m.pieces : [{ pts: m.pts }]).map((pc, i) => { const pathD = pc.pts.map((p, j) => `${j === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ") + " Z"; const fill = i === 0 ? "#efe8cf" : "#e6f2ff"; return `<path d="${pathD}" fill="${fill}" stroke="#333" stroke-width="1.2" />`; }).join(""); const minX = bb.minX, maxX = bb.maxX, minY = bb.minY, maxY = bb.maxY; const offY = Math.max(14, h * 0.08); const offX = Math.max(14, w * 0.08); const dimTopY = minY - offY; const dimLeftX = minX - offX; const ribLines = (m.ribs || []).map((rb) => `<line x1="${rb[0][0]}" y1="${rb[0][1]}" x2="${rb[1][0]}" y2="${rb[1][1]}" stroke="#cc3b00" stroke-width="0.8" />` ).join(""); svg.innerHTML = ` <defs> <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"> <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4157"></path> </marker> </defs> ${pathList} ${ribLines} <line x1="0" y1="0" x2="${m.R}" y2="0" stroke="#444" stroke-dasharray="4 4" /> <line x1="0" y1="0" x2="${m.r}" y2="0" stroke="#666" stroke-dasharray="4 4" /> ${Number.isFinite(m.theta) ? `<line x1="${m.R * Math.cos(-m.theta / 2)}" y1="${m.R * Math.sin(-m.theta / 2)}" x2="${m.R * Math.cos(m.theta / 2)}" y2="${m.R * Math.sin(m.theta / 2)}" stroke="#7b5a00" stroke-width="0.8" />` : ""} <text x="${m.R * 0.05}" y="${-Math.max(12, h * 0.1)}" font-size="10" fill="#7b5a00">${Number.isFinite(m.thetaDeg) ? `θ=${f(m.thetaDeg, 2)}°` : "放樣分割近似展開"}</text>

<line x1="${minX}" y1="${minY}" x2="${minX}" y2="${dimTopY}" stroke="#2f4157" stroke-width="0.8"/> <line x1="${maxX}" y1="${minY}" x2="${maxX}" y2="${dimTopY}" stroke="#2f4157" stroke-width="0.8"/> <line x1="${minX}" y1="${dimTopY}" x2="${maxX}" y2="${dimTopY}" stroke="#2f4157" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/> <text x="${(minX + maxX) / 2}" y="${dimTopY - 4}" text-anchor="middle" font-size="10" fill="#2f4157">Amax=${f(m.Amax)} mm</text>

<line x1="${minX}" y1="${minY}" x2="${dimLeftX}" y2="${minY}" stroke="#2f4157" stroke-width="0.8"/> <line x1="${minX}" y1="${maxY}" x2="${dimLeftX}" y2="${maxY}" stroke="#2f4157" stroke-width="0.8"/> <line x1="${dimLeftX}" y1="${minY}" x2="${dimLeftX}" y2="${maxY}" stroke="#2f4157" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/> <text x="${dimLeftX - 3}" y="${(minY + maxY) / 2}" text-anchor="end" font-size="10" fill="#2f4157">Bmax=${f(m.Bmax)} mm</text>

<line x1="0" y1="0" x2="${m.R}" y2="0" stroke="#444" stroke-width="0.8" marker-end="url(#arrow)"/> <line x1="0" y1="0" x2="${m.r}" y2="0" stroke="#666" stroke-width="0.8" marker-end="url(#arrow)"/> <text x="${m.R * 0.56}" y="${Math.max(12, h * 0.08)}" font-size="10" fill="#333">R=${f(m.R)} mm</text> <text x="${m.r * 0.45}" y="${Math.max(24, h * 0.13)}" font-size="10" fill="#333">r=${f(m.r)} mm</text> <text x="${(minX + maxX) / 2}" y="${maxY + Math.max(14, h * 0.08)}" text-anchor="middle" font-size="10" fill="#333">${m.mode === "dualHalf" ? "單邊" : "完整"} A(外弧)=${f(m.outerArcLen)} mm；a(內弧)=${f(m.innerArcLen)} mm；B(母線)=${f(m.L)} mm</text> `; }

function dxfFromPoints(pieces, ribs = []) { const lines = []; lines.push("0","SECTION","2","HEADER","0","ENDSEC"); lines.push("0","SECTION","2","ENTITIES"); for (let p = 0; p < pieces.length; p++) { const pts = pieces[p].pts; const layer = p === 0 ? "OUTER" : "INNER"; for (let i = 0; i < pts.length; i++) { const p1 = pts[i]; const p2 = pts[(i + 1) % pts.length]; lines.push("0","LINE"); lines.push("8", layer); lines.push("10", f(p1[0], 6)); lines.push("20", f(p1[1], 6)); lines.push("30","0.0"); lines.push("11", f(p2[0], 6)); lines.push("21", f(p2[1], 6)); lines.push("31","0.0"); } } for (const rb of ribs) { lines.push("0","LINE"); lines.push("8","RIB"); lines.push("10", f(rb[0][0], 6)); lines.push("20", f(rb[0][1], 6)); lines.push("30","0.0"); lines.push("11", f(rb[1][0], 6)); lines.push("21", f(rb[1][1], 6)); lines.push("31","0.0"); } lines.push("0","ENDSEC","0","EOF"); return lines.join("\n"); }

function download(filename, data, type) { const blob = new Blob([data], { type }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url); }

function svgText() { const m = model; const bb = (m.pieces && m.pieces.length) ? bboxOfPieces(m.pieces) : bbox(m.pts); const pad = Math.max(20, 0.08 * Math.max(m.Amax, m.Bmax)); const w = bb.maxX - bb.minX; const h = bb.maxY - bb.minY; const vb = `${bb.minX - pad} ${bb.minY - pad} ${w + pad * 2} ${h + pad * 2}`; const paths = (m.pieces && m.pieces.length ? m.pieces : [{ pts: m.pts }]).map((pc) => { const pathD = pc.pts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ") + " Z"; return `<path d="${pathD}" fill="none" stroke="black" stroke-width="1"/>`; }).join("\n "); return `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}">\n ${paths}\n</svg>`; }

async function downloadPng() { const text = svgText(); const img = new Image(); const svgBlob = new Blob([text], { type: "image/svg+xml;charset=utf-8" }); const url = URL.createObjectURL(svgBlob);

await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = url; });

const canvas = document.createElement("canvas"); canvas.width = img.width || 1600; canvas.height = img.height || 1000; const ctx = canvas.getContext("2d"); ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

URL.revokeObjectURL(url); canvas.toBlob((blob) => { const out = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = out; a.download = "cone_unfold.png"; a.click(); URL.revokeObjectURL(out); }, "image/png"); }

function run() { try { const m = compute(); renderResult(m); renderSvg(m); $("msg").innerHTML = `<span class="ok">已完成計算，可下載 DXF / SVG / PNG。</span>`; $("dxfBtn").disabled = false; $("svgBtn").disabled = false; $("pngBtn").disabled = false; } catch (e) { $("msg").innerHTML = `<span class="warn">${e.message}</span>`; $("results").innerHTML = ""; $("preview").innerHTML = ""; $("dxfBtn").disabled = true; $("svgBtn").disabled = true; $("pngBtn").disabled = true; } }

function syncModeUI() { const dual = $("mode").value === "dualHalf"; const single = $("mode").value === "single"; const byAngle = $("singleInputMode").value === "angle"; $("pWrap").style.display = dual ? "block" : "none"; $("dualCalWrap1").style.display = dual ? "block" : "none"; $("dualCalWrap2").style.display = dual ? "block" : "none"; $("dualCalWrap3").style.display = dual ? "block" : "none"; $("singleInputModeWrap").style.display = single ? "block" : "none"; $("angleWrap").style.display = single && byAngle ? "block" : "none"; $("H").disabled = single && byAngle; if (dual && (!num("P") || num("P") <= 0)) { $("P").value = f(num("D") / 2, 3); } }

$("calcBtn").addEventListener("click", run); $("mode").addEventListener("change", () => { syncModeUI(); run(); }); $("singleInputMode").addEventListener("change", () => { syncModeUI(); run(); }); $("D").addEventListener("input", () => { if ($("mode").value === "dualHalf") $("P").value = f(num("D") / 2, 3); if ($("mode").value === "single" && $("singleInputMode").value === "angle") run(); }); $("angle").addEventListener("input", () => { if ($("mode").value === "single" && $("singleInputMode").value === "angle") run(); }); $("dxfBtn").addEventListener("click", () => { const pieces = model.pieces && model.pieces.length ? model.pieces : [{ pts: model.pts }]; const dxf = dxfFromPoints(pieces, model.ribs || []); download("cone_unfold.dxf", dxf, "application/dxf"); }); $("svgBtn").addEventListener("click", () => { download("cone_unfold.svg", svgText(), "image/svg+xml"); }); $("pngBtn").addEventListener("click", downloadPng);

syncModeUI(); run(); </script></body></html>
