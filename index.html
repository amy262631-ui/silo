

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei",Arial,sans-serif;background:var(--color-background-tertiary);padding:16px;color:var(--color-text-primary)}
.wrap{max-width:960px;margin:0 auto;background:var(--color-background-primary);border:1.5px solid var(--color-border-primary);border-radius:var(--border-radius-lg);overflow:hidden}
.header{padding:14px 20px;background:var(--color-background-secondary);border-bottom:1.5px solid var(--color-border-primary)}
.header h2{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.header p{font-size:12px;color:var(--color-text-secondary);margin-top:2px}

.tabs{display:flex;border-bottom:1.5px solid var(--color-border-primary)}
.tb{flex:1;padding:11px;border:none;background:transparent;font-size:14px;font-weight:500;cursor:pointer;color:var(--color-text-secondary);border-bottom:3px solid transparent;transition:.15s}
.tb:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.tb.active{color:#185FA5;border-bottom:3px solid #378ADD;background:var(--color-background-primary)}
.tc{display:none}.tc.active{display:block}

.layout{display:grid;grid-template-columns:300px 1fr;min-height:560px}
@media(max-width:700px){.layout{grid-template-columns:1fr}}

/* 輸入區 — 明顯邊界 + 背景 */
.inp-col{
  background:#EAF3DE;
  border-right:2px solid #639922;
  padding:0;
}
.inp-header{
  background:#639922;
  color:#fff;
  font-size:12px;
  font-weight:500;
  letter-spacing:.5px;
  padding:7px 16px;
  display:flex;align-items:center;gap:6px;
}
.inp-body{padding:14px 16px}

.gh{font-size:11px;font-weight:500;color:#3B6D11;text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px;padding-bottom:5px;border-bottom:1.5px solid #97C459}
.gh:first-child{margin-top:0}
.row{margin-bottom:9px}
label{display:block;font-size:12px;color:#3B6D11;margin-bottom:3px;font-weight:500}
input,select{
  width:100%;padding:6px 9px;
  border:1px solid #97C459;
  border-radius:4px;
  background:#fff;
  color:var(--color-text-primary);
  font-size:14px;font-family:var(--font-mono);
}
input:focus,select:focus{outline:none;border-color:#3B6D11;box-shadow:0 0 0 2px rgba(99,153,34,.2)}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* 結果區 — 白底，格線清楚 */
.res-col{background:var(--color-background-primary);padding:0}
.res-header{
  background:var(--color-background-secondary);
  border-bottom:1.5px solid var(--color-border-primary);
  font-size:12px;font-weight:500;color:var(--color-text-secondary);
  letter-spacing:.5px;padding:7px 16px;
  display:flex;align-items:center;gap:6px;
}
.res-body{padding:14px 16px}

.rcard{
  border:1px solid var(--color-border-secondary);
  border-radius:var(--border-radius-md);
  overflow:hidden;margin-bottom:12px;
}
.rcard-head{
  background:var(--color-background-secondary);
  font-size:11px;font-weight:500;color:var(--color-text-secondary);
  letter-spacing:.4px;padding:5px 12px;
  border-bottom:1px solid var(--color-border-tertiary);
}
.rrow{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 12px;font-size:13px;
  border-bottom:1px solid var(--color-border-tertiary);
}
.rrow:last-child{border-bottom:none}
.rrow.hi{background:#E6F1FB}
.rl{color:var(--color-text-secondary)}
.rv{font-weight:500;font-family:var(--font-mono);color:var(--color-text-primary)}
.rv.blue{color:#185FA5}

.total{
  border:1px solid #B5D4F4;
  border-radius:var(--border-radius-md);
  background:#E6F1FB;
  padding:10px 14px;
  margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.total.gray{background:#F1EFE8;border-color:#D3D1C7}
.tl{font-size:12px;color:#185FA5}
.tl2{font-size:12px;color:#5F5E5A}
.tv{font-size:20px;font-weight:500;color:#0C447C;font-family:var(--font-mono)}
.tv2{font-size:20px;font-weight:500;color:#444441;font-family:var(--font-mono)}
.tsub{font-size:11px;color:#5F5E5A;margin-top:2px}

svg.draw{width:100%;height:440px;background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:visible;display:block}
</style>

<div class="wrap">
  <div class="header">
    <h2>混凝土廠容器設計工具</h2>
    <p>水泥桶 (Silo) ／ 骨材庫 (Aggregate Bin)</p>
  </div>
  <div class="tabs">
    <button class="tb active" id="btn-c" onclick="sw('c')">🟢 水泥桶 (Silo)</button>
    <button class="tb" id="btn-a" onclick="sw('a')">🟤 骨材庫 (Bin)</button>
  </div>

  <!-- 水泥桶 -->
  <div id="tc-c" class="tc active">
    <div class="layout">
      <div class="inp-col">
        <div class="inp-header">✏️ 輸入參數</div>
        <div class="inp-body">
          <div class="gh">需求設定</div>
          <div class="row"><label>需求重量 (T)</label><input type="number" id="c_w" value="150" oninput="rc()"></div>
          <div class="row"><label>比重 (t/m³)</label><input type="number" id="c_rho" value="1.33" step="0.01" oninput="rc()"></div>
          <div class="row"><label>預留高 (m)</label><input type="number" id="c_fb" value="0.5" step="0.1" oninput="rc()"></div>
          <div class="gh">尺寸參數</div>
          <div class="row"><label>直徑 (m)</label><input type="number" id="c_dia" value="4.37" step="0.01" oninput="rc()"></div>
          <div class="row"><label>單層板高 (m)</label><input type="number" id="c_ph" value="1.5" step="0.1" oninput="rc()"></div>
          <div class="dual" style="margin-bottom:9px">
            <div><label>錐斗斜度 (°)</label><input type="number" id="c_ang" value="60" oninput="rc()"></div>
            <div>
              <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:3px">
                <label style="margin:0">出口尺寸</label>
                <select id="c_unit" onchange="rc()" style="width:auto;padding:2px 4px;font-size:11px;border-color:#97C459">
                  <option value="inch" selected>英制 (in)</option>
                  <option value="m">公尺 (m)</option>
                </select>
              </div>
              <input type="number" id="c_out" value="12" oninput="rc()">
            </div>
          </div>
        </div>
      </div>
      <div class="res-col">
        <div class="res-header">📐 計算結果</div>
        <div class="res-body">
          <div class="rcard">
            <div class="rcard-head">尺寸計算</div>
            <div class="rrow"><span class="rl">所需層數</span><span class="rv" id="r_c_lay">--</span></div>
            <div class="rrow"><span class="rl">直身高度</span><span class="rv" id="r_c_cyl">--</span></div>
            <div class="rrow"><span class="rl">錐斗高度</span><span class="rv" id="r_c_con">--</span></div>
            <div class="rrow hi"><span class="rl" style="font-weight:500">總設計高度</span><span class="rv blue" id="r_c_tot">--</span></div>
          </div>
          <div class="rcard" style="margin-bottom:12px">
  <div class="rcard-head">容積明細</div>
  <div class="rrow"><span class="rl">桶身容積</span><span class="rv" id="r_c_cyl_vol">--</span></div>
  <div class="rrow"><span class="rl">錐斗容積</span><span class="rv" id="r_c_con_vol">--</span></div>
  <div class="rrow hi"><span class="rl" style="font-weight:500">總容積</span><span class="rv blue" id="r_c_vol">--</span></div>
</div>
<div class="total t-blue">
  <div><div class="tl">預估滿載重量</div><div class="tsub">依輸入尺寸計算</div></div>
  <div class="tv"><span id="r_c_max">0</span> T</div>
</div>
          <svg id="svgC" class="draw" viewBox="0 0 380 400"></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- 骨材庫 -->
  <div id="tc-a" class="tc">
    <div class="layout">
      <div class="inp-col">
        <div class="inp-header">✏️ 輸入參數</div>
        <div class="inp-body">
          <div class="gh">共用結構 (田字型)</div>
          <div class="dual">
            <div><label>總長 L (m)</label><input type="number" id="a_L" value="12" oninput="ra()"></div>
            <div><label>總寬 W (m)</label><input type="number" id="a_W" value="12" oninput="ra()"></div>
          </div>
          <div class="row" style="margin-top:8px"><label>直身高度 (m)</label><input type="number" id="a_Hb" value="4.8" step="0.1" oninput="ra()"></div>

          <div class="gh" style="color:#993C1D;border-color:#F0997B">砂倉 (左側 × 2)</div>
          <div class="dual">
            <div><label>錐斗垂高 (m)</label><input type="number" id="a_hs" value="4.927" step="0.001" oninput="ra()"></div>
            <div><label>比重 (t/m³)</label><input type="number" id="a_rs" value="1.6" step="0.01" oninput="ra()"></div>
          </div>
          <label style="font-size:12px;color:#993C1D;margin:6px 0 3px;display:block;font-weight:500">出口尺寸 (m) — L × W</label>
          <div class="dual">
            <input type="number" id="a_oLs" value="2.3" placeholder="L" oninput="ra()" style="border-color:#F0997B">
            <input type="number" id="a_oWs" value="1.7" placeholder="W" oninput="ra()" style="border-color:#F0997B">
          </div>

          <div class="gh" style="color:#444441;border-color:#B4B2A9;margin-top:14px">石倉 (右側 × 2)</div>
          <div class="dual">
            <div><label>錐斗垂高 (m)</label><input type="number" id="a_hst" value="4.3" step="0.001" oninput="ra()"></div>
            <div><label>比重 (t/m³)</label><input type="number" id="a_rst" value="1.55" step="0.01" oninput="ra()"></div>
          </div>
          <label style="font-size:12px;color:#444441;margin:6px 0 3px;display:block;font-weight:500">出口尺寸 (m) — L × W</label>
          <div class="dual">
            <input type="number" id="a_oLst" value="2.3" placeholder="L" oninput="ra()" style="border-color:#B4B2A9">
            <input type="number" id="a_oWst" value="1.7" placeholder="W" oninput="ra()" style="border-color:#B4B2A9">
          </div>
        </div>
      </div>
      <div class="res-col">
        <div class="res-header">📐 計算結果</div>
        <div class="res-body">
          <div class="rcard">
            <div class="rcard-head">容積計算</div>
            <div class="rrow"><span class="rl">單倉頂部尺寸</span><span class="rv" id="r_a_top">--</span></div>
            <div class="rrow" style="border-left:3px solid #D85A30"><span class="rl" style="color:#993C1D">砂倉單顆容積</span><span class="rv" id="r_a_vs">--</span></div>
            <div class="rrow" style="border-left:3px solid #D85A30"><span class="rl" style="color:#993C1D">砂倉單顆重量</span><span class="rv" id="r_a_ws">--</span></div>
            <div class="rrow" style="border-left:3px solid #888780"><span class="rl" style="color:#5F5E5A">石倉單顆容積</span><span class="rv" id="r_a_vst">--</span></div>
            <div class="rrow" style="border-left:3px solid #888780"><span class="rl" style="color:#5F5E5A">石倉單顆重量</span><span class="rv" id="r_a_wst">--</span></div>
          </div>
          <div class="total gray">
            <div><div class="tl2">總重量 (2砂 + 2石)</div><div class="tsub">總容積：<span id="r_a_vt">0</span> m³</div></div>
            <div class="tv2"><span id="r_a_wt">0</span> T</div>
          </div>
          <svg id="svgA" class="draw" viewBox="0 0 480 400"></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function sw(t){
  ['c','a'].forEach(x=>{
    document.getElementById('tc-'+x).className='tc'+(x===t?' active':'');
    document.getElementById('btn-'+x).className='tb'+(x===t?' active':'');
  });
  if(t==='c')rc();else ra();
}
function v(id){let e=document.getElementById(id);return e?(parseFloat(e.value)||0):0;}
function ns(x,d=2){return isNaN(x)||!isFinite(x)?'--':x.toFixed(d);}

function rc(){
  let W=v('c_w'),rho=v('c_rho')||1,D=v('c_dia'),ph=v('c_ph'),ang=v('c_ang');
  let outV=v('c_out'),unit=document.getElementById('c_unit').value,fb=v('c_fb');
  let dOut=(unit==='inch')?(outV*0.0254):outV;
  let R=D/2,r=dOut/2;
  let hCone=(R-r)*Math.tan(ang*Math.PI/180);
  if(hCone<0)hCone=0;
  let vCone=(Math.PI*hCone/3)*(R*R+R*r+r*r);
  let vReq=W/rho,vCylNeed=vReq-vCone;
  let area=Math.PI*R*R;
  let hCylTheo=vCylNeed>0?vCylNeed/area:0;
  let layers=Math.ceil((hCylTheo+fb)/ph);
  if(layers<1)layers=1;
  let hCyl=layers*ph,vTot=(area*hCyl)+vCone,wTot=vTot*rho,hTot=hCyl+hCone;
  document.getElementById('r_c_lay').textContent=layers+' 層';
  document.getElementById('r_c_cyl').textContent=ns(hCyl)+' m';
  document.getElementById('r_c_con').textContent=ns(hCone)+' m';
  document.getElementById('r_c_tot').textContent=ns(hTot)+' m';
  document.getElementById('r_c_max').textContent=ns(wTot,1);
document.getElementById('r_c_cyl_vol').textContent=ns(area*hCyl,2);
document.getElementById('r_c_con_vol').textContent=ns(vCone,2);
document.getElementById('r_c_vol').textContent=ns(vTot,2);
  drawC(D,hCyl,hCone,dOut,layers);
}

function arr(id,col){
  return `<marker id="${id}S" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M8,0L0,4L8,8z" fill="${col}"/></marker>
<marker id="${id}E" markerWidth="8" markerHeight="8" refX="0" refY="4" orient="auto"><path d="M0,0L8,4L0,8z" fill="${col}"/></marker>`;
}
function dimH(x,y,w,txt,col='#888780',id='g'){
  if(w<1)return'';
  return `<line x1="${x}" y1="${y}" x2="${x+w}" y2="${y}" stroke="${col}" stroke-width="1" marker-start="url(#${id}S)" marker-end="url(#${id}E)"/>
<line x1="${x}" y1="${y-4}" x2="${x}" y2="${y+4}" stroke="${col}"/>
<line x1="${x+w}" y1="${y-4}" x2="${x+w}" y2="${y+4}" stroke="${col}"/>
<text x="${x+w/2}" y="${y-5}" fill="${col}" font-size="11" text-anchor="middle" font-family="monospace">${txt}</text>`;
}
function dimV(x,y,h,txt,col='#888780',id='g',anchor='start'){
  if(h<1)return'';
  let tx=anchor==='end'?x-4:x+4;
  return `<line x1="${x}" y1="${y}" x2="${x}" y2="${y+h}" stroke="${col}" stroke-width="1" marker-start="url(#${id}S)" marker-end="url(#${id}E)"/>
<line x1="${x-4}" y1="${y}" x2="${x+4}" y2="${y}" stroke="${col}"/>
<line x1="${x-4}" y1="${y+h}" x2="${x+4}" y2="${y+h}" stroke="${col}"/>
<text x="${tx}" y="${y+h/2+4}" fill="${col}" font-size="11" text-anchor="${anchor}" font-family="monospace">${txt}</text>`;
}

function drawC(D,h1,h2,dOut,layers){
  let svg=document.getElementById('svgC');
  let W=380,H=400,pad=50;
  let totH=h1+h2||1;
  let ppm=Math.min((H-pad*2.2)/totH,(W-pad*2.2)/D);
  let Wpx=D*ppm,H1px=h1*ppm,H2px=h2*ppm,oPx=Math.max(dOut*ppm,4);
  let cx=W/2,x=cx-Wpx/2,y=pad;
  let s=`<defs>${arr('g','#888780')}</defs>`;
  s+=`<rect x="${x}" y="${y}" width="${Wpx}" height="${H1px}" fill="rgba(55,138,221,.08)" stroke="#378ADD" stroke-width="2"/>`;
  if(layers>1){
    let step=H1px/layers;
    for(let i=1;i<layers;i++){
      let ly=y+i*step;
      s+=`<line x1="${x}" y1="${ly}" x2="${x+Wpx}" y2="${ly}" stroke="#B5D4F4" stroke-width="1" stroke-dasharray="5,3"/>`;
      s+=`<text x="${x+6}" y="${ly-3}" fill="#378ADD" font-size="10" font-family="monospace">${i}</text>`;
    }
  }
  let y2=y+H1px,y3=y2+H2px,oL=cx-oPx/2,oR=cx+oPx/2;
  s+=`<polygon points="${x},${y2} ${x+Wpx},${y2} ${oR},${y3} ${oL},${y3}" fill="rgba(55,138,221,.04)" stroke="#378ADD" stroke-width="2"/>`;
  s+=`<line x1="${oL}" y1="${y3}" x2="${oR}" y2="${y3}" stroke="#185FA5" stroke-width="3"/>`;
  s+=dimH(x,y-18,Wpx,`D = ${D.toFixed(2)} m`);
  s+=dimV(x-14,y,H1px,`${h1.toFixed(2)} m`,'#888780','g','end');
  s+=dimV(x-14,y2,H2px,`${h2.toFixed(2)} m`,'#888780','g','end');
  s+=`<line x1="${oL}" y1="${y3}" x2="${oL}" y2="${y3+26}" stroke="#aaa"/>`;
  s+=`<line x1="${oR}" y1="${y3}" x2="${oR}" y2="${y3+26}" stroke="#aaa"/>`;
  s+=dimH(oL,y3+20,oPx,`d=${dOut.toFixed(3)}m`,'#5F5E5A','g');
  if(H1px>20)s+=`<text x="${cx}" y="${y+H1px/2+5}" fill="#185FA5" font-size="12" text-anchor="middle" font-family="monospace">${layers} 層</text>`;
  svg.innerHTML=s;
}

function ra(){
  let L=v('a_L'),W=v('a_W'),Hb=v('a_Hb');
  let hs=v('a_hs'),rs=v('a_rs'),oLs=v('a_oLs'),oWs=v('a_oWs');
  let hst=v('a_hst'),rst=v('a_rst'),oLst=v('a_oLst'),oWst=v('a_oWst');
  let Lc=L/2,Wc=W/2,At=Lc*Wc,Vbox=At*Hb;
  let Abs=oLs*oWs,Vcs=(hs/3)*(At+Abs+Math.sqrt(At*Abs)),Vs=Vbox+Vcs;
  let Abst=oLst*oWst,Vcst=(hst/3)*(At+Abst+Math.sqrt(At*Abst)),Vst=Vbox+Vcst;
  let Vtot=(Vs+Vst)*2,Wtot=(Vs*rs+Vst*rst)*2;
  document.getElementById('r_a_top').textContent=`${ns(Lc)} × ${ns(Wc)} m`;
  document.getElementById('r_a_vs').textContent=ns(Vs)+' m³';
  document.getElementById('r_a_vst').textContent=ns(Vst)+' m³';
  document.getElementById('r_a_ws').textContent=ns(Vs*rs,1)+' T';
  document.getElementById('r_a_wst').textContent=ns(Vst*rst,1)+' T';
  document.getElementById('r_a_wt').textContent=ns(Wtot,1);
  document.getElementById('r_a_vt').textContent=ns(Vtot,1);
  drawA(L,Hb,hs,hst,oLs,oLst);
}

function drawA(L,Hb,hs,hst,ws,wst){
  let svg=document.getElementById('svgA');
  let W=480,H=400,pad=50;
  let maxH=Hb+Math.max(hs,hst)+1;
  let ppm=Math.min((H-pad*2)/maxH,(W-pad*2.5)/L);
  let Wh=L/2*ppm,Hbpx=Hb*ppm,Hspx=hs*ppm,Hstpx=hst*ppm;
  let wspx=Math.max(ws*ppm,5),wstpx=Math.max(wst*ppm,5);
  let x=(W-Wh*2)/2,y=pad;
  let s=`<defs>${arr('g','#888780')}${arr('r','#D85A30')}</defs>`;
  s+=`<rect x="${x}" y="${y}" width="${Wh}" height="${Hbpx}" fill="rgba(217,90,48,.07)" stroke="#D85A30" stroke-width="2"/>`;
  s+=`<rect x="${x+Wh}" y="${y}" width="${Wh}" height="${Hbpx}" fill="rgba(136,135,128,.1)" stroke="#888780" stroke-width="2"/>`;
  s+=`<line x1="${x+Wh}" y1="${y}" x2="${x+Wh}" y2="${y+Hbpx}" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="5,4"/>`;
  let y2=y+Hbpx,cxs=x+Wh/2,cxst=x+Wh+Wh/2;
  s+=`<polygon points="${x},${y2} ${x+Wh},${y2} ${cxs+wspx/2},${y2+Hspx} ${cxs-wspx/2},${y2+Hspx}" fill="rgba(217,90,48,.06)" stroke="#D85A30" stroke-width="2"/>`;
  s+=`<polygon points="${x+Wh},${y2} ${x+Wh*2},${y2} ${cxst+wstpx/2},${y2+Hstpx} ${cxst-wstpx/2},${y2+Hstpx}" fill="rgba(136,135,128,.07)" stroke="#888780" stroke-width="2"/>`;
  s+=`<text x="${cxs}" y="${y+Hbpx/2+6}" fill="#993C1D" font-size="15" text-anchor="middle" font-family="monospace" font-weight="500">砂</text>`;
  s+=`<text x="${cxst}" y="${y+Hbpx/2+6}" fill="#5F5E5A" font-size="15" text-anchor="middle" font-family="monospace" font-weight="500">石</text>`;
  s+=`<text x="${cxs}" y="${y2+Hspx+15}" fill="#993C1D" font-size="11" text-anchor="middle" font-family="monospace">${hs.toFixed(3)}m</text>`;
  s+=`<text x="${cxst}" y="${y2+Hstpx+15}" fill="#888780" font-size="11" text-anchor="middle" font-family="monospace">${hst.toFixed(3)}m</text>`;
  s+=dimH(x,y-18,Wh*2,`L = ${v('a_L').toFixed(1)} m`);
  let rx=x+Wh*2+16;
  s+=`<line x1="${x+Wh*2}" y1="${y}" x2="${rx+8}" y2="${y}" stroke="#ccc" stroke-dasharray="3,3"/>`;
  s+=`<line x1="${x+Wh*2}" y1="${y+Hbpx}" x2="${rx+8}" y2="${y+Hbpx}" stroke="#ccc" stroke-dasharray="3,3"/>`;
  s+=dimV(rx+4,y,Hbpx,`H=${Hb}m`,'#888780','g','start');
  let diff=Math.abs(hs-hst);
  if(diff>0.005){
    let my1=y2+Math.min(Hspx,Hstpx),my2=y2+Math.max(Hspx,Hstpx);
    let mx=x+Wh*2+40;
    s+=`<line x1="${hs>hst?x+Wh:x+Wh*2}" y1="${my2}" x2="${mx+8}" y2="${my2}" stroke="#F0997B" stroke-dasharray="2,2"/>`;
    s+=dimV(mx+4,my1,my2-my1,`Δ${diff.toFixed(3)}`,'#D85A30','r','start');
  }
  svg.innerHTML=s;
}

rc();ra();
</script>
